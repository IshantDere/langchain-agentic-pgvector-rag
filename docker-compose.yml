services:

  app:
    build: .
    container_name: langchain_app
    ports:
      - "8000:8000"
    depends_on:
      - pgvector
    env_file:
      - .env
    volumes:
      - .:/app

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector_db
    restart: always
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5544:5432"